<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crime Investigation Vocabulary Mindmap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0c10;
    --bg2: #111318;
    --bg3: #181c24;
    --border: #1e2330;
    --c1: #3b82f6;  /* Crime Scene - blue */
    --c2: #a855f7;  /* Forensics - purple */
    --c3: #ef4444;  /* Arrest - red */
    --c4: #f59e0b;  /* Police Station - amber */
    --c5: #10b981;  /* Identity - green */
    --c6: #06b6d4;  /* Interview - cyan */
    --c7: #f97316;  /* Court - orange */
    --text: #e2e8f0;
    --muted: #4b5563;
    --soft: #9ca3af;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 40px 20px 24px;
    position: relative;
  }
  .hero-badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: .65rem;
    letter-spacing: .15em;
    color: var(--c3);
    border: 1px solid var(--c3);
    padding: 3px 10px;
    border-radius: 3px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .hero h1 {
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    font-weight: 700;
    color: #fff;
    letter-spacing: -.02em;
    line-height: 1.15;
  }
  .hero h1 span { color: var(--c1); }
  .hero p {
    margin-top: 8px;
    color: var(--soft);
    font-size: .82rem;
  }

  /* ── STATS ROW ── */
  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 0 20px 20px;
  }
  .stat {
    font-family: 'Space Mono', monospace;
    font-size: .68rem;
    color: var(--soft);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
  }
  .stat b { color: var(--text); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    padding: 0 16px 20px;
  }
  .tab {
    font-family: 'Space Mono', monospace;
    font-size: .65rem;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--muted);
    cursor: pointer;
    transition: all .18s;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .tab:hover { color: var(--text); border-color: #374151; }
  .tab.on { color: #fff; border-color: var(--ac); background: color-mix(in srgb, var(--ac) 15%, transparent); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 12px;
    padding: 0 16px 50px;
    max-width: 1500px;
    margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: transform .15s, box-shadow .15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.5); }
  .card.open { border-color: var(--ac); }

  .card-hd {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    background: color-mix(in srgb, var(--ac) 8%, var(--bg2));
  }
  .card-icon {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: color-mix(in srgb, var(--ac) 20%, transparent);
    border: 1px solid color-mix(in srgb, var(--ac) 40%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-title {
    font-size: .78rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }
  .card-sub {
    font-size: .62rem;
    color: var(--soft);
    margin-top: 1px;
    font-family: 'Space Mono', monospace;
  }
  .card-count {
    font-family: 'Space Mono', monospace;
    font-size: .62rem;
    color: var(--ac);
    background: color-mix(in srgb, var(--ac) 12%, transparent);
    padding: 2px 7px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-arr {
    font-size: .65rem;
    color: var(--ac);
    flex-shrink: 0;
    transition: transform .2s;
  }
  .card.open .card-arr { transform: rotate(180deg); }

  /* ── BODY ── */
  .card-bd {
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
  }
  .card.open .card-bd { max-height: 1200px; overflow-y: auto; }
  .card-bd::-webkit-scrollbar { width: 3px; }
  .card-bd::-webkit-scrollbar-thumb { background: var(--border); }

  .bd-inner { padding: 12px 14px; }

  /* Section inside card */
  .sec { margin-bottom: 12px; }
  .sec:last-child { margin-bottom: 0; }
  .sec-title {
    font-family: 'Space Mono', monospace;
    font-size: .6rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ac);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid color-mix(in srgb, var(--ac) 20%, transparent);
  }

  /* Vocab entry */
  .entry {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 10px;
    padding: 5px 0;
    border-bottom: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
    align-items: start;
  }
  .entry:last-child { border-bottom: none; }

  .en {
    font-family: 'Space Mono', monospace;
    font-size: .71rem;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    padding-top: 1px;
  }
  .en .pos {
    font-size: .55rem;
    font-weight: 400;
    color: var(--ac);
    margin-left: 3px;
    opacity: .8;
  }

  .vi-wrap { min-width: 0; }
  .vi {
    font-size: .7rem;
    color: #94a3b8;
    line-height: 1.4;
  }
  .vi b { color: #cbd5e1; font-weight: 600; }
  .vi em { color: color-mix(in srgb, var(--ac) 90%, white); font-style: normal; }

  /* Verb list (compact) */
  .vlist { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
  .vtag {
    font-family: 'Space Mono', monospace;
    font-size: .6rem;
    padding: 2px 7px;
    border-radius: 3px;
    background: color-mix(in srgb, var(--ac) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--ac) 30%, transparent);
    color: var(--ac);
    cursor: default;
    transition: background .15s;
    line-height: 1.6;
  }
  .vtag:hover { background: color-mix(in srgb, var(--ac) 22%, transparent); }
  .vtag span {
    display: block;
    font-size: .56rem;
    color: var(--soft);
    font-family: 'Space Grotesk', sans-serif;
    margin-top: 1px;
  }

  /* Penalty pills */
  .pills { display: flex; flex-direction: column; gap: 5px; margin-top: 5px; }
  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 9px;
    border-radius: 5px;
    border: 1px solid color-mix(in srgb, var(--ac) 25%, transparent);
    background: color-mix(in srgb, var(--ac) 7%, transparent);
  }
  .pill-en {
    font-family: 'Space Mono', monospace;
    font-size: .65rem;
    font-weight: 700;
    color: var(--ac);
    white-space: nowrap;
  }
  .pill-vi {
    font-size: .68rem;
    color: var(--soft);
  }

  /* Fingers diagram */
  .hand {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 5px;
  }
  .finger {
    text-align: center;
    background: color-mix(in srgb, var(--ac) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--ac) 30%, transparent);
    border-radius: 6px;
    padding: 6px 8px;
    flex: 1;
    min-width: 55px;
  }
  .finger-en {
    font-family: 'Space Mono', monospace;
    font-size: .58rem;
    color: var(--ac);
    display: block;
    font-weight: 700;
  }
  .finger-vi {
    font-size: .62rem;
    color: var(--soft);
    display: block;
    margin-top: 2px;
  }

  .hidden { display: none !important; }

  /* Divider */
  hr.sec-div {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }
</style>
</head>

function buildCard(d) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = d.id;
  card.style.setProperty('--ac', d.ac);

  let sectionsHTML = '';
  for (const sec of d.sections) {
    sectionsHTML += `<div class="sec"><div class="sec-title">${sec.title}</div>`;

    if (sec.type === 'entries') {
      sec.items.forEach(([en, pos, vi]) => {
        sectionsHTML += `
          <div class="entry">
            <div class="en">${en}<span class="pos">${pos}</span></div>
            <div class="vi-wrap"><div class="vi">${vi}</div></div>
          </div>`;
      });
    }

    else if (sec.type === 'verbs') {
      sectionsHTML += `<div class="vlist">`;
      sec.items.forEach(([en, vi]) => {
        sectionsHTML += `<div class="vtag">${en}<span>${vi}</span></div>`;
      });
      sectionsHTML += `</div>`;
    }

    else if (sec.type === 'penalties') {
      sectionsHTML += `<div class="pills">`;
      sec.items.forEach(([en, vi]) => {
        sectionsHTML += `<div class="pill"><span class="pill-en">${en}</span><span class="pill-vi">${vi}</span></div>`;
      });
      sectionsHTML += `</div>`;
    }

    else if (sec.type === 'hand') {
      sectionsHTML += `<div class="hand">`;
      sec.fingers.forEach(([en, vi]) => {
        sectionsHTML += `<div class="finger"><span class="finger-en">${en}</span><span class="finger-vi">${vi}</span></div>`;
      });
      sectionsHTML += `</div><hr class="sec-div">`;
      sec.extras.forEach(([en, pos, vi]) => {
        sectionsHTML += `
          <div class="entry">
            <div class="en">${en}<span class="pos">${pos}</span></div>
            <div class="vi-wrap"><div class="vi">${vi}</div></div>
          </div>`;
      });
    }

    sectionsHTML += `</div>`;
  }

  card.innerHTML = `
    <div class="card-hd">
      <div class="card-icon">${d.icon}</div>
      <div class="card-meta">
        <div class="card-title">${d.title}</div>
        <div class="card-sub">${d.sub}</div>
      </div>
      <div class="card-count">${d.count}</div>
      <div class="card-arr">▼</div>
    </div>
    <div class="card-bd"><div class="bd-inner">${sectionsHTML}</div></div>
  `;

  card.querySelector('.card-hd').addEventListener('click', () => {
    card.classList.toggle('open');
  });

  return card;
}

const grid = document.getElementById('grid');
CARDS.forEach(d => grid.appendChild(buildCard(d)));

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.remove('on');
      t.style.removeProperty('background');
      t.style.removeProperty('border-color');
      t.style.color = '';
    });
    this.classList.add('on');

    const f = this.dataset.f;
    document.querySelectorAll('.card').forEach(c => {
      c.classList[f === 'all' || c.dataset.id === f ? 'remove' : 'add']('hidden');
    });
  });
});
