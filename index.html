<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kho Học Tập – Nguyễn Hữu Khánh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0B1622;
    --navy-mid: #152032;
    --navy-light: #1E2E44;
    --red: #C0392B;
    --red-bright: #E74C3C;
    --gold: #D4A017;
    --gold-light: #F0C040;
    --white: #F5F7FA;
    --muted: #8A9BB0;
    --border: rgba(212,160,23,0.25);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px);
    pointer-events: none;
    z-index: 0;
  }
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 270px;
    background: var(--navy-mid);
    border-right: 1px solid var(--border);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 100;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-header {
    background: var(--red);
    padding: 20px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-header img {
    width: 38px;
    height: 38px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .sidebar-header span {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1.3;
  }
  .sidebar ul { list-style: none; padding: 12px 0; flex: 1; }
  .sidebar li {
    padding: 13px 22px;
    cursor: pointer;
    font-size: 14px;
    color: #b0bec5;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    letter-spacing: 0.02em;
  }
  .sidebar li:hover {
    background: var(--navy-light);
    color: var(--gold-light);
    border-left-color: var(--gold);
  }
  .sidebar-section-title {
    padding: 18px 22px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Oswald', sans-serif;
  }
  .menu-btn {
    position: fixed;
    top: 16px; left: 16px;
    z-index: 200;
    background: var(--red);
    border: none;
    color: white;
    width: 42px; height: 42px;
    border-radius: 6px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(192,57,43,0.5);
    transition: background 0.2s;
  }
  .menu-btn:hover { background: var(--red-bright); }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
  }
  .overlay.active { display: block; }
  main { position: relative; z-index: 1; min-height: 100vh; }
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px 60px;
    text-align: center;
    position: relative;
    background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(192,57,43,0.12) 0%, transparent 70%);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--red), var(--gold), var(--red));
  }
  .shield-wrap {
    position: relative;
    margin-bottom: 28px;
  }
  .shield-ring {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 0 6px rgba(212,160,23,0.08), 0 0 40px rgba(212,160,23,0.2);
    background: rgba(255,255,255,0.04);
  }
  .shield-ring::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 1px solid rgba(212,160,23,0.3);
  }
  .shield-ring img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    position: relative;
    z-index: 1;
  }
  .stars {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 6px;
  }
  .eyebrow {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--red-bright);
    margin-bottom: 12px;
  }
  .hero-name {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
    margin-bottom: 6px;
    color: var(--white);
  }
  .hero-class {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 400;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    margin-bottom: 20px;
  }
  .divider {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--red), var(--gold));
    margin: 0 auto 20px;
    border-radius: 2px;
  }
  .hero-desc {
    font-size: 14px;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.7;
    margin-bottom: 40px;
  }
  .cards-section {
    padding: 0 24px 60px;
    max-width: 900px;
    margin: 0 auto;
  }
  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 20px;
  }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--navy-mid);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), var(--gold));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }
  .card:hover {
    background: var(--navy-light);
    border-color: rgba(212,160,23,0.5);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card:hover::after { transform: scaleX(1); }
  .card-icon { font-size: 28px; margin-bottom: 10px; }
  .card-label {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--white);
    text-transform: uppercase;
  }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .bottom-bar {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    background: var(--navy-mid);
  }
  .bottom-bar span { color: var(--red-bright); }
  #content-view { display: none; padding: 72px 24px 40px; max-width: 900px; margin: 0 auto; }
  #content-view.active { display: block; }
  .hero.hidden { display: none; }
  .cards-section.hidden { display: none; }
  @media (max-width: 480px) {
    .cards-grid { grid-template-columns: repeat(2, 1fr); }
    .shield-ring { width: 140px; height: 140px; }
    .shield-ring img { width: 96px; height: 96px; }
  }
</style>
</head>
